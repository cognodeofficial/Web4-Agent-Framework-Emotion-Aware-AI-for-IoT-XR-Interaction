<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COGNODE Embed Demo</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-black text-white perf-mode">
  <div class="min-h-screen p-6">
    <div class="glass-panel rounded-3xl max-w-4xl mx-auto border border-neon-blue/30">
      <div class="p-6 border-b border-white/10">
        <h1 class="font-orbitron text-2xl">Embed Demo</h1>
        <p class="mt-2 text-sm text-gray-400">Minimal chat embed using built‑in utilities.</p>
      </div>
      <div class="p-6 space-y-6">
        <div class="space-y-3">
          <div class="flex gap-3">
            <input id="e-input" type="text" placeholder="Type a message" class="flex-1 bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-neon-blue transition-all">
            <button class="p-3 rounded-xl bg-gradient-to-r from-neon-blue to-neon-purple hover:opacity-90 transition-all" onclick="sendMessageProxy()">
              <span class="text-white text-lg font-bold leading-none">⏎</span>
            </button>
          </div>
          <div class="flex gap-2">
            <button class="px-3 py-2 rounded-xl glass-panel hover:bg-white/10 transition-all" onclick="quickReplyProxy('Recruit a productivity agent')">Recruit Agent</button>
            <button class="px-3 py-2 rounded-xl glass-panel hover:bg-white/10 transition-all" onclick="quickReplyProxy('Connect my IoT')">Connect IoT</button>
          </div>
        </div>
        <div id="e-log" class="space-y-2"></div>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script>
    (() => {
      const i = document.getElementById('e-input');
      const l = document.getElementById('e-log');
      if (i) i.addEventListener('keydown', e => { if (e.key === 'Enter' || e.keyCode === 13 || e.which === 13) { e.preventDefault(); sendMessageProxy(); } });
      const add = t => { const d = document.createElement('div'); d.className = 'chat-bubble agent cmd'; d.innerHTML = '<div class="cmd-line"><span class="cmd-prompt">COGNODE AI></span><span class="cmd-text">'+t+'</span></div>'; l.appendChild(d); };
      window.addEventListener('load', () => { add('Embed ready'); });
    })();
  </script>
</body>
</html>
