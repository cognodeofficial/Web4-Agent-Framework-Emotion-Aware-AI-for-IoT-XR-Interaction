<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Agent Onboarding — Minimal</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body class="font-inter antialiased">
  <main class="max-w-3xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-4">Smart Agent Onboarding (Minimal)</h1>
    <div class="space-y-3">
      <div class="flex gap-2">
        <input id="m-input" class="flex-1 border px-3 py-2 rounded" placeholder="Type a message..." />
        <button class="px-3 py-2 rounded bg-neon-blue text-white" onclick="sendMessageProxy()">Send</button>
        <button class="px-3 py-2 rounded glass-panel" onclick="quickReplyProxy('Recruit a productivity agent')">Recruit Agent</button>
      </div>
      <div class="flex gap-2">
        <button class="px-3 py-2 rounded glass-panel" onclick="app.toggleVoiceInput()">Voice</button>
        <button class="px-3 py-2 rounded glass-panel" onclick="app.showGesturePad()">Gesture</button>
      </div>
      <div id="m-log" class="space-y-2 mt-4"></div>
    </div>
  </main>
  <script src="../js/main.js"></script>
  <script>
    (() => {
      const input = document.getElementById('m-input');
      const log = document.getElementById('m-log');
      if (input) input.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.keyCode === 13 || e.which === 13) {
          e.preventDefault(); sendMessageProxy();
        }
      });
      const add = t => { const d = document.createElement('div'); d.className = 'chat-bubble agent cmd'; d.innerHTML = '<div class=\"cmd-line\"><span class=\"cmd-prompt\">COGNODE AI></span><span class=\"cmd-text\">'+t+'</span></div>'; log.appendChild(d); };
      window.addEventListener('load', () => { add('Onboarding minimal ready'); });
    })();
  </script>
</body>
</html>
