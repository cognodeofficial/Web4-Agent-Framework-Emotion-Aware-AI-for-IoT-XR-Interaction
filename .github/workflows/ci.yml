name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify repository structure
        run: |
          test -f README.md
          test -f index.html
          test -d docs
          test -d examples
