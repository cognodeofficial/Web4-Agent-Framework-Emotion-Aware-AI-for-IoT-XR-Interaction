name: ci
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls -la
      - run: test -f index.html
      - run: test -f css/styles.css
      - run: test -f js/main.js
